<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>拾柒cafe訂位管理系統</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --bg: #f5f0e8;
    --bg2: #ede7d9;
    --cream: #faf7f2;
    --latte: #c9a97a;
    --espresso: #6b4c2a;
    --text: #3d2b1a;
    --text-light: #9a7d65;
    --border: rgba(180,150,110,0.25);
    --shadow: 0 4px 20px rgba(100,70,40,0.10);
    --radius: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif TC', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 40px 60px;
  }
  @media (max-width: 900px) {
    body { padding: 20px 18px 48px; }
    header { flex-wrap: wrap; gap: 12px; }
    .brand h1 { font-size: 1.6rem; }
  }
  @media (max-width: 600px) {
    body { padding: 14px 10px 60px; }
    .brand h1 { font-size: 1.3rem; }
    .brand p  { display: none; }
    .btn-add  { padding: 10px 16px; font-size: .78rem; }
    .date-nav input[type=date] { width: 108px; font-size: .76rem; }
  }

  /* ── Header ───────────────────────────────────────── */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .brand h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    color: var(--espresso);
    letter-spacing: .06em;
    line-height: 1;
  }
  .brand p {
    font-size: .72rem;
    color: var(--text-light);
    letter-spacing: .18em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .btn-add {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--espresso);
    color: var(--cream);
    border: none;
    border-radius: 50px;
    padding: 10px 22px;
    font-family: 'Noto Serif TC', serif;
    font-size: .82rem;
    letter-spacing: .1em;
    cursor: pointer;
    transition: background .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 3px 12px rgba(100,60,20,.22);
  }
  .btn-add:hover { background: #5a3a1a; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(100,60,20,.28); }
  .btn-add .plus { font-size: 1.1rem; line-height:1; }

  .date-nav {
    display: flex; align-items: center; gap: 6px;
    background: var(--cream); border: 1px solid var(--border);
    border-radius: 50px; padding: 6px 14px;
    box-shadow: 0 2px 8px rgba(100,70,40,.08);
  }
  .date-nav input[type=date] {
    border: none;
    background: transparent;
    font-family: 'Noto Serif TC', serif;
    font-size: .82rem; color: var(--espresso);
    letter-spacing: .05em; outline: none; cursor: pointer;
    padding: 0 4px;
    width: 130px;
  }
  .date-nav-btn {
    background: none; border: none; color: var(--latte);
    font-size: 1.15rem; cursor: pointer;
    padding: 0 4px;
    border-radius: 6px; transition: color .15s, background .15s; line-height:1;
  }
  .date-nav-btn:hover { color: var(--espresso); background: var(--bg2); }
  .date-nav-btn.today-btn {
    font-family: 'Noto Serif TC', serif; font-size: .7rem;
    letter-spacing: .06em; padding: 3px 10px;
    border: 1px solid var(--border); border-radius: 50px;
  }
  #gantt-date-label {
    font-size: .78rem; color: var(--text-light);
    letter-spacing: .1em;
    margin-bottom: 8px; text-align: right;
  }
  #gantt-date-label.is-today { color: var(--latte); font-weight: 500; }

  /* ── Gantt Wrapper ────────────────────────────────── */
  .gantt-wrap {
    background: var(--cream);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 28px 28px 32px;
    border: 1px solid var(--border);
    position: relative;
  }
  @media (max-width: 600px) {
    .gantt-wrap { padding: 16px 10px 20px; border-radius: 12px; }
  }

  /* ── Gantt Grid ───────────────────────────────────── */
  .gantt {
    display: grid;
    grid-template-columns: 100px repeat(16, minmax(45px, 1fr));
    min-width: 820px;
    position: relative;
  }

  .gh-corner { grid-column: 1; grid-row: 1; }
  .gh-time {
    text-align: center;
    font-size: .68rem;
    color: var(--text-light);
    letter-spacing: .08em;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    user-select: none;
    grid-row: 1;
  }
  .gh-time.hour-mark {
    font-size: .72rem;
    color: var(--latte);
    font-weight: 500;
  }

  /* Rows */
  .grow-label {
    grid-column: 1;
    display: flex;
    align-items: center;
    font-size: .75rem;
    color: var(--text-light);
    letter-spacing: .08em;
    padding: 0 10px 0 4px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    user-select: none;
    white-space: nowrap;
    background: var(--cream);
    position: sticky;
    left: 0;
    z-index: 5;
  }

  .gcell {
    height: 56px;
    border-bottom: 1px solid var(--border);
    border-left: 1px solid transparent;
    transition: background .15s;
  }
  .gcell.hour-start { border-left: 1px solid var(--border); }
  .gcell:hover { background: rgba(210,185,150,.12); }

  /* ── 訂位畫布容器 ── */
  .res-container {
    grid-column: 2 / span 16;
    position: relative;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* ── Reservation Blocks ───────────────────────────── */
  .res-block {
    position: absolute;
    height: 44px;
    border-radius: 8px;
    padding: 0 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    z-index: 10;
    box-shadow: 0 2px 10px rgba(0,0,0,.12);
    transition: transform .15s, box-shadow .15s, opacity .15s, border .15s;
    overflow: hidden;
    pointer-events: auto;
    touch-action: none;
  }
  .res-block:hover {
    transform: translateY(-1px) scale(1.01);
    box-shadow: 0 6px 18px rgba(0,0,0,.18);
    z-index: 20;
  }
  .res-block.group-highlight {
    box-shadow: 0 0 0 3px #e67e22, 0 4px 15px rgba(230, 126, 34, 0.4) !important;
    z-index: 25;
  }
  .res-block.dragging {
    opacity: .85;
    cursor: grabbing;
    z-index: 100;
    box-shadow: 0 10px 30px rgba(0,0,0,.22);
  }

  .res-name {
    font-size: .72rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .res-time {
    font-size: .62rem;
    opacity: .75;
    white-space: nowrap;
  }

  .arrived-icon {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: .82rem;
    font-weight: 700;
    opacity: .85;
    line-height: 1;
    pointer-events: none;
  }
  .res-block.arrived {
    border-left-width: 5px !important;
  }

  /* ── Tooltip ──────────────────────────────────────── */
  #tooltip {
    position: fixed;
    background: var(--espresso);
    color: var(--cream);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: .76rem;
    line-height: 1.7;
    pointer-events: none;
    opacity: 0;
    transition: opacity .18s;
    z-index: 999;
    max-width: 220px;
    box-shadow: 0 8px 24px rgba(0,0,0,.22);
    letter-spacing: .04em;
  }
  #tooltip.show { opacity: 1; }
  #tooltip strong { font-size: .8rem; display: block; margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,.2); padding-bottom: 4px; }

  /* ── Context Actions ──────────────────────────────── */
  #ctx-menu {
    position: fixed;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    box-shadow: 0 8px 28px rgba(0,0,0,.22);
    z-index: 2000;
    display: none;
    gap: 4px;
    flex-direction: column;
    min-width: 140px;
  }
  #ctx-menu.show { display: flex; }
  #ctx-confirm-bar {
    display: flex;
    align-items: center;
    border-top: 1px solid var(--border);
    margin-top: 4px;
    padding-top: 4px;
    gap: 2px;
  }
  .ctx-btn {
    background: none;
    border: none;
    padding: 9px 14px;
    border-radius: 8px;
    font-family: 'Noto Serif TC', serif;
    font-size: .78rem;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    letter-spacing: .05em;
    transition: background .15s;
  }
  .ctx-btn:hover { background: var(--bg2); }
  .ctx-btn.danger { color: #c0392b; }
  .ctx-btn.danger:hover { background: #fce8e6; }

  /* ── Modal ────────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(60,40,20,.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 500;
    opacity: 0; pointer-events: none;
    transition: opacity .22s;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--cream);
    border-radius: 20px;
    padding: 36px 40px 32px;
    width: 440px;
    max-width: 92vw;
    box-shadow: 0 20px 60px rgba(60,30,10,.22);
    transform: translateY(16px) scale(.97);
    transition: transform .25s cubic-bezier(.22,1,.36,1);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.55rem;
    font-weight: 300;
    color: var(--espresso);
    margin-bottom: 26px;
    letter-spacing: .05em;
  }

  .form-row { margin-bottom: 18px; }
  .form-row label {
    display: block;
    font-size: .7rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 7px;
  }

  .input-row { display: flex; gap: 8px; }

  input[type=text], input[type=tel], input[type=number], select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 13px;
    font-family: 'Noto Serif TC', serif;
    font-size: .82rem;
    color: var(--text);
    outline: none;
    transition: border-color .18s, box-shadow .18s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--latte);
    box-shadow: 0 0 0 3px rgba(180,140,90,.15);
  }

  .table-checkbox-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
    gap: 8px;
    background: var(--bg);
    padding: 12px;
    border-radius: 9px;
    border: 1px solid var(--border);
    max-height: 150px;
    overflow-y: auto;
  }
  .table-cb-label {
    display: flex !important;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem !important;
    color: var(--text) !important;
    cursor: pointer;
    user-select: none;
    margin-bottom: 0 !important;
  }
  .table-cb-label input {
    cursor: pointer;
    width: 15px;
    height: 15px;
    accent-color: var(--espresso);
  }

  .suffix-group { display: flex; gap: 8px; align-items: center; flex: 1; }
  .suffix-group input { flex: 1; }
  .suffix-btn {
    padding: 10px 14px; border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--bg); font-family: 'Noto Serif TC', serif; font-size: .78rem;
    color: var(--text-light); cursor: pointer; transition: all .15s;
    white-space: nowrap;
  }
  .suffix-btn.active, .suffix-btn:hover { background: var(--espresso); color: var(--cream); border-color: var(--espresso); }

  .time-row { display: flex; align-items: center; gap: 6px; }
  .time-sep { color: var(--text-light); font-size: .9rem; padding: 0 2px; }
  .time-row select { width: auto; padding: 10px 8px; text-align: center; cursor: pointer; }
  #f-start-h, #f-end-h, #f-start-m, #f-end-m { min-width: 65px; }

  textarea { resize: vertical; min-height: 72px; }

  .modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 28px; gap: 10px; }
  .btn-save {
    background: var(--espresso); color: var(--cream); border: none; border-radius: 50px;
    padding: 11px 30px;
    font-family: 'Noto Serif TC', serif; font-size: .82rem;
    letter-spacing: .1em; cursor: pointer; transition: all .2s; box-shadow: 0 3px 12px rgba(100,60,20,.22);
  }
  .btn-save:hover { background: #5a3a1a; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(100,60,20,.28); }
  .btn-cancel { background: none; border: none; color: var(--text-light); font-family: 'Noto Serif TC', serif; font-size: .78rem; cursor: pointer; letter-spacing: .06em; transition: color .15s; }
  .btn-cancel:hover { color: var(--text); }

  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .leg-item { display: flex; align-items: center; gap: 7px; font-size: .7rem; color: var(--text-light); letter-spacing: .06em; }
  .leg-dot { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--latte); border-radius: 10px; }

  /* ── 密碼鎖全螢幕遮罩樣式 ── */
  .auth-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 1;
    transition: opacity 0.3s ease;
  }
  .auth-box {
    background: var(--cream);
    padding: 40px;
    border-radius: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    text-align: center;
    width: 340px;
    max-width: 90vw;
  }
  .auth-box h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 300;
    color: var(--espresso);
    margin-bottom: 8px;
  }
  .auth-box p {
    font-size: 0.75rem;
    color: var(--text-light);
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }
  .auth-box input[type=password] {
    text-align: center;
    letter-spacing: 0.3em;
    font-size: 1.1rem;
    margin-bottom: 16px;
    width: 100%;
    max-width: 260px;
    box-sizing: border-box;
  }
  .auth-error {
    color: #c0392b;
    font-size: 0.75rem;
    margin-top: -10px;
    margin-bottom: 14px;
    display: none;
  }
  .btn-login {
    background: var(--espresso);
    color: var(--cream);
    border: none;
    border-radius: 50px;
    padding: 10px 0;
    width: 100%;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s;
    box-shadow: 0 3px 12px rgba(100,60,20,.15);
  }
  .btn-login:hover { background: #5a3a1a; }
</style>
</head>
<body>

<div class="auth-overlay" id="auth-overlay">
  <div class="auth-box">
    <h2>🔑 系統管理員登入</h2>
    <p>MANAGEMENT LOGIN</p>
    <input type="password" id="auth-password" placeholder="請輸入管理者密碼" onkeydown="if(event.key==='Enter') checkPassword()">
    <div class="auth-error" id="auth-error">❌ 密碼錯誤，請再試一次</div>
    <button class="btn-login" onclick="checkPassword()">確認登入</button>
  </div>
</div>

<div id="main-app" style="display: none;">

  <div id="fb-banner" style="display:none;background:#fef3c7;border:1px solid #f59e0b; border-radius:10px;padding:11px 18px;margin-bottom:16px;font-size:.78rem; color:#78350f;letter-spacing:.04em;line-height:1.7">
    ☁️ <strong>Firebase 未設定</strong>，目前使用 localStorage（僅此裝置可見）。<br>
    如需跨裝置同步，請在程式碼頂端填入你的 Firebase 設定。
    <button onclick="this.parentElement.style.display='none'" style="float:right;background:none;border:none;cursor:pointer;font-size:1.1rem;line-height:1;margin-left:10px">✕</button>
  </div>

  <header>
    <div class="brand">
      <h1>☕ 拾柒cafe訂位管理系統</h1>
      <p>Reservation Dashboard</p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
      <div class="date-nav">
        <button class="date-nav-btn" onclick="shiftDate(-1)" title="前一天">‹</button>
        <input type="date" id="date-picker" onchange="switchDate(this.value)">
        <button class="date-nav-btn" onclick="shiftDate(1)"  title="後一天">›</button>
        <button class="date-nav-btn today-btn" onclick="switchDate(todayStr())" title="回今天">今</button>
      </div>
      <button class="btn-add" onclick="openModal()"><span class="plus">＋</span>新增訂位</button>
    </div>
  </header>

  <div class="legend" id="legend"></div>
  <div id="gantt-date-label"></div>

  <div class="gantt-wrap">
    <div class="gantt" id="gantt">
      </div>
  </div>

</div>

<div id="tooltip"></div>

<div id="ctx-menu">
  <button class="ctx-btn" id="ctx-edit-btn">✏️ 編輯訂位</button>
  <button class="ctx-btn" id="ctx-arrived-btn">✔ 已抵達</button>
  <button class="ctx-btn" id="ctx-checkout-btn">🚪 已離開</button>
  <button class="ctx-btn danger" id="ctx-delete-btn">🗑 刪除訂位</button>
  <div id="ctx-confirm-bar" style="display:none">
    <span style="font-size:.72rem;color:#c0392b;padding:4px 4px 4px 10px;letter-spacing:.04em">確定連同夥伴桌一起？</span>
    <button class="ctx-btn danger" id="ctx-confirm-yes" style="padding:6px 10px">刪除</button>
    <button class="ctx-btn" id="ctx-confirm-no"  style="padding:6px 10px">取消</button>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <h2 id="modal-title">新增訂位</h2>
    <div class="form-row">
      <label>訂位人姓名</label>
      <div class="input-row">
        <input type="text" id="f-name" placeholder="請輸入姓氏" style="max-width:140px">
        <div class="suffix-group">
          <button class="suffix-btn active" id="btn-mr" onclick="setSuffix('先生')">先生</button>
          <button class="suffix-btn" id="btn-ms" onclick="setSuffix('小姐')">小姐</button>
        </div>
      </div>
    </div>
    <div class="form-row">
      <label>開始時間</label>
      <div class="time-row">
        <select id="f-start-h" onchange="autoSetEndTime()"></select>
        <span class="time-sep">:</span>
        <select id="f-start-m" onchange="autoSetEndTime()"></select>
      </div>
    </div>
    <div class="form-row">
      <label>結束時間</label>
      <div class="time-row">
        <select id="f-end-h"></select>
        <span class="time-sep">:</span>
        <select id="f-end-m"></select>
      </div>
    </div>
    <div class="form-row">
      <label>聯絡電話</label>
      <input type="tel" id="f-phone" placeholder="例如：0912345678">
    </div>
    <div class="form-row">
      <label>人數</label>
      <input type="number" id="f-pax" min="1" max="30" placeholder="2" style="max-width:100px">
    </div>
    <div class="form-row">
      <label>指派桌號 (可多選佔多桌)</label>
      <div class="table-checkbox-grid" id="table-checkbox-container">
        </div>
    </div>
    <div class="form-row">
      <label>備註事項</label>
      <textarea id="f-note" placeholder="特殊需求、慶生、兒童椅等..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveReservation()">儲存訂位</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// FIREBASE CONFIG
// ═══════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCAlWYyeJOhvqpxJRXFQmNCrV-0CGYdEhE",
  authDomain: "cafe-reservation-f8228.firebaseapp.com",
  projectId: "cafe-reservation-f8228",
  storageBucket: "cafe-reservation-f8228.appspot.com",
  messagingSenderId: "542387799589",

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getReservations() {
  if (!reservationsByDate[currentDate]) reservationsByDate[currentDate] = [];
  return reservationsByDate[currentDate];
}

function saveLocal() {
  try { localStorage.setItem('rbd_v1', JSON.stringify(reservationsByDate)); } catch(e) {}
}
function loadLocal() {
  try {
    const s = localStorage.getItem('rbd_v1');
    if (s) reservationsByDate = JSON.parse(s);
  } catch(e) { reservationsByDate = {}; }
}

async function saveDateToFirebase(dateStr) {
  if (!FB_ENABLED || !db) return;
  try {
    await db.collection('reservations').doc(dateStr).set({ list: reservationsByDate[dateStr] || [] });
  } catch(e) {}
}

async function loadDateFromFirebase(dateStr) {
  if (!FB_ENABLED || !db) return false;
  try {
    const doc = await db.collection('reservations').doc(dateStr).get();
    if (doc.exists) {
      reservationsByDate[dateStr] = doc.data().list || [];
      saveLocal();
      return true;
    }
    return false;
  } catch(e) { return false; }
}

function saveAll() {
  saveLocal();
  saveDateToFirebase(currentDate);
}

async function loadAll() {
  loadLocal();
  if (FB_ENABLED) {
    const ok = await loadDateFromFirebase(currentDate);
    if (ok) render();

}

function timeStrToMin(str) {
  const m = str.trim().match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  return parseInt(m[1]) * 60 + parseInt(m[2]);
}
function minToTimeStr(min) {
  return `${String(Math.floor(min / 60)).padStart(2,'0')}:${String(min % 60).padStart(2,'0')}`;
}

function isConflict(tableId, startMin, endMin, excludeIds = []) {
  if (!Array.isArray(excludeIds)) excludeIds = [excludeIds];
  return getReservations().find(r => !excludeIds.includes(r.id) && r.tableId === tableId && startMin < r.endMin && endMin > r.startMin) || null;
}

function _doDelete() {
  const id = pendingDeleteId; pendingDeleteId = null;
  document.getElementById('ctx-confirm-bar').style.display = 'none';
  hideCtxMenu();
  if (!id) return;

  const rs = getReservations();
  const target = rs.find(r => r.id === id);
  if (!target) return;

  if (target.groupId) {
    reservationsByDate[currentDate] = rs.filter(r => r.groupId !== target.groupId);
  } else {
    reservationsByDate[currentDate] = rs.filter(r => r.id !== id);
  }
  saveAll(); render();
}
function _cancelDelete() {
  pendingDeleteId = null;
  document.getElementById('ctx-confirm-bar').style.display = 'none';
}

function toggleArrived(id) {
  if (!id) return;
  const rs = getReservations();
  const target = rs.find(x => x.id === id);
  if (!target) return;
  const newState = !target.arrived;
  
  if (target.groupId) {
    rs.forEach(x => { if (x.groupId === target.groupId) x.arrived = newState; });
  } else {
    target.arrived = newState;
  }
  saveAll(); render(); hideCtxMenu();
}

function toggleCheckout(id) {
  if (!id) return;
  const rs = getReservations();
  const target = rs.find(x => x.id === id);
  if (!target) return;
  const now = new Date();
  const currentMin = now.getHours() * 60 + now.getMinutes();
  const finalMin = Math.max(target.startMin + 15, Math.min(currentMin, DAY_END));

  if (target.groupId) {
    rs.forEach(x => { if (x.groupId === target.groupId) x.endMin = finalMin; });
  } else {
    target.endMin = finalMin;
  }
  saveAll(); render(); hideCtxMenu();
}

function buildGantt() {
  const g = document.getElementById('gantt'); g.innerHTML = '';
  const corner = document.createElement('div'); corner.className = 'gh-corner'; g.appendChild(corner);

  for (let s = 0; s < GRID_SLOTS; s++) {
    const totalMins = DAY_START + (s * 30);
    const h = Math.floor(totalMins / 60); const m = totalMins % 60;
    const div = document.createElement('div');
    div.className = 'gh-time' + (m === 0 ? ' hour-mark' : '');
    div.textContent = `${h}:${String(m).padStart(2,'0')}`; div.style.gridColumn = s + 2;
    g.appendChild(div);
  }

  TABLES.forEach((t, rIdx) => {
    const label = document.createElement('div');
    label.className = 'grow-label'; label.textContent = t.label; label.style.gridRow = rIdx + 2;
    g.appendChild(label);

    for (let s = 0; s < GRID_SLOTS; s++) {
      const cell = document.createElement('div');
      cell.className = 'gcell' + (s % 2 === 0 ? ' hour-start' : '');
      cell.style.gridRow = rIdx + 2; cell.style.gridColumn = s + 2;
      g.appendChild(cell);
    }
  });

  const resContainer = document.createElement('div');
  resContainer.className = 'res-container'; resContainer.id = 'res-container';
  resContainer.style.gridRow = `2 / span ${TABLES.length}`;
  g.appendChild(resContainer);
}

function buildLegend() {
  const l = document.getElementById('legend'); l.innerHTML = '';
  TABLES.forEach(t => {
    const item = document.createElement('div'); item.className = 'leg-item';
    const dot = document.createElement('div'); dot.className = 'leg-dot'; dot.style.background = t.bg;
    const txt = document.createElement('span'); txt.textContent = t.label;
    item.appendChild(dot); item.appendChild(txt); l.appendChild(item);
  });
}

function buildTableCheckboxes() {
  const container = document.getElementById('table-checkbox-container');
  container.innerHTML = '';
  TABLES.forEach(t => {
    const lbl = document.createElement('label'); lbl.className = 'table-cb-label';
    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = t.id; cb.name = 'f-tables';
    lbl.appendChild(cb); lbl.appendChild(document.createTextNode(' ' + t.label));
    container.appendChild(lbl);
  });
}

function buildTimeSelects() {
  const sh = document.getElementById('f-start-h'), sm = document.getElementById('f-start-m');
  const eh = document.getElementById('f-end-h'),   em = document.getElementById('f-end-m');
  sh.innerHTML = ''; sm.innerHTML = ''; eh.innerHTML = ''; em.innerHTML = '';

  const startHour = Math.floor(DAY_START / 60), endHour = Math.floor(DAY_END / 60);
  for (let h = startHour; h <= endHour; h++) {
    const opt = document.createElement('option'); opt.value = h; opt.textContent = String(h).padStart(2,'0');
    sh.appendChild(opt); eh.appendChild(opt.cloneNode(true));
  }
  [0, 30].forEach(m => {
    const opt = document.createElement('option'); opt.value = m; opt.textContent = String(m).padStart(2,'0');
    sm.appendChild(opt); em.appendChild(opt.cloneNode(true));
  });
}

function autoSetEndTime() {
  const sh = parseInt(document.getElementById('f-start-h').value);
  const sm = parseInt(document.getElementById('f-start-m').value);
  let total = sh * 60 + sm + 120;
  if (total > DAY_END) total = DAY_END;
  document.getElementById('f-end-h').value = Math.floor(total / 60);
  document.getElementById('f-end-m').value = total % 60;
}

// CORE RENDER & INTERACTION
// ═══════════════════════════════════════════════════
function render() {
  const container = document.getElementById('res-container'); if (!container) return;
  container.innerHTML = '';
  const list = getReservations();
  const cellWidth = container.clientWidth / GRID_SLOTS;

  list.forEach(r => {
    const rIdx = TABLES.findIndex(t => t.id === r.tableId); if (rIdx < 0) return;
    const tMeta = TABLES[rIdx];

    const leftPercent = ((r.startMin - DAY_START) / DAY_MINS) * 100;
    const widthPercent = ((r.endMin - r.startMin) / DAY_MINS) * 100;

    const b = document.createElement('div'); b.className = 'res-block'; b.id = `block-${r.id}`;
    if (r.arrived) b.classList.add('arrived');
    b.style.left = `${leftPercent}%`; b.style.width = `${widthPercent}%`;
    b.style.top = `${6 + rIdx * 56}px`;
    b.style.background = tMeta.bg; b.style.color = tMeta.fg; b.style.borderLeft = `3px solid ${tMeta.fg}`;

    const nSpan = document.createElement('div'); nSpan.className = 'res-name';
    nSpan.textContent = `${r.name}${r.suffix || ''} (${r.pax}人)`;
    const tSpan = document.createElement('div'); tSpan.className = 'res-time';
    tSpan.textContent = `${minToTimeStr(r.startMin)}–${minToTimeStr(r.endMin)}`;

    b.appendChild(nSpan); b.appendChild(tSpan);
    if (r.arrived) {
      const icon = document.createElement('span'); icon.className = 'arrived-icon'; icon.textContent = '✓';
      b.appendChild(icon);
    }

    // Drag-and-Drop Event Bindings
    b.addEventListener('mousedown', (e) => startDrag(e, r, b));
    b.addEventListener('touchstart', (e) => startDrag(e, r, b), { passive: false });

    // Context Menu Event Binding
    b.addEventListener('contextmenu', (e) => { e.preventDefault(); showCtxMenu(e, r.id); });

    // Hover Tooltip Events
    b.addEventListener('mouseenter', (e) => showTooltip(e, r));
    b.addEventListener('mousemove', moveTooltip);
    b.addEventListener('mouseleave', hideTooltip);

    container.appendChild(b);
  });
}

// ═══════════════════════════════════════════════════
// DRAG AND DROP ENGINE
// ═══════════════════════════════════════════════════
let dragData = null;
function startDrag(e, res, element) {
  if (e.button && e.button !== 0) return;
  e.preventDefault(); e.stopPropagation(); hideCtxMenu();

  const isTouch = e.type.startsWith('touch');
  const clientX = isTouch ? e.touches[0].clientX : e.clientX;
  const clientY = isTouch ? e.touches[0].clientY : e.clientY;

  const container = document.getElementById('res-container');
  const totalWidth = container.clientWidth;
  const slotW = totalWidth / GRID_SLOTS;

  const rs = getReservations();
  let partnerBlocks = [];
  let groupIds = [];

  if (res.groupId) {
    const groupMembers = rs.filter(x => x.groupId === res.groupId);
    partnerBlocks = groupMembers.map(m => ({ res: m, el: document.getElementById(`block-${m.id}`) })).filter(p => p.el !== null);
    groupIds = groupMembers.map(x => x.id);
  } else {
    partnerBlocks = [{ res, el: element }];
    groupIds = [res.id];
  }

  partnerBlocks.forEach(p => { p.el.classList.add('dragging'); p.origLeft = parseFloat(p.el.style.left); p.origTop = parseFloat(p.el.style.top); });

  dragData = {
    isTouch, clientX, clientY, slotW, totalWidth, res, element, partnerBlocks, groupIds,
    origStartMin: res.startMin, origEndMin: res.endMin, duration: res.endMin - res.startMin,
    hasMoved: false
  };

  if (isTouch) {
    window.addEventListener('touchmove', doDrag, { passive: false }); window.addEventListener('touchend', endDrag);
  } else {
    window.addEventListener('mousemove', doDrag); window.addEventListener('mouseup', endDrag);
  }
}

function doDrag(e) {
  if (!dragData) return; e.preventDefault();
  const clientX = dragData.isTouch ? e.touches[0].clientX : e.clientX;
  const clientY = dragData.isTouch ? e.touches[0].clientY : e.clientY;

  const dx = clientX - dragData.clientX;
  if (Math.abs(dx) > 4) dragData.hasMoved = true;

  const slotIndexDelta = Math.round(dx / dragData.slotW);
  const minDelta = slotIndexDelta * 30;

  let targetStartMin = dragData.origStartMin + minDelta;
  let targetEndMin = targetStartMin + dragData.duration;

  if (targetStartMin < DAY_START) { targetStartMin = DAY_START; targetEndMin = targetStartMin + dragData.duration; }
  if (targetEndMin > DAY_END) { targetEndMin = DAY_END; targetStartMin = targetEndMin - dragData.duration; }

  const currentMinDelta = targetStartMin - dragData.origStartMin;

  dragData.partnerBlocks.forEach(p => {
    const pStart = p.res.startMin + currentMinDelta;
    const pLeft = ((pStart - DAY_START) / DAY_MINS) * 100;
    p.el.style.left = `${pLeft}%`;
    const timeText = p.el.querySelector('.res-time');
    if (timeText) timeText.textContent = `${minToTimeStr(pStart)}–${minToTimeStr(pStart + (p.res.endMin - p.res.startMin))}`;
  });
}

function endDrag() {
  if (!dragData) return;
  if (dragData.isTouch) {
    window.removeEventListener('touchmove', doDrag); window.removeEventListener('touchend', endDrag);
  } else {
    window.removeEventListener('mousemove', doDrag); window.removeEventListener('mouseup', endDrag);
  }

  dragData.partnerBlocks.forEach(p => p.el.classList.remove('dragging'));

  if (!dragData.hasMoved) {
    if (!dragData.isTouch) { dragData = null; return; }
    const mockEvent = { clientX: dragData.clientX, clientY: dragData.clientY, preventDefault:()=>{} };
    showCtxMenu(mockEvent, dragData.res.id); dragData = null; return;
  }

  const container = document.getElementById('res-container');
  const finalLeftPercent = parseFloat(dragData.element.style.left);
  const finalStartMin = Math.round((finalLeftPercent / 100) * DAY_MINS + DAY_START);
  const minDelta = finalStartMin - dragData.origStartMin;

  let conflictFound = null;
  for (let p of dragData.partnerBlocks) {
    const nS = p.res.startMin + minDelta; const nE = p.res.endMin + minDelta;
    const conf = isConflict(p.res.tableId, nS, nE, dragData.groupId);
    if (conf) { conflictFound = { p, conf }; break; }
  }

  if (conflictFound) {
    alert(`⚠️ 拖曳衝突！${TABLES.find(t=>t.id===conflictFound.p.res.tableId).label} 在新時段已存在「${conflictFound.conf.name}${conflictFound.conf.suffix || ''}」的訂位。`);
    render(); dragData = null; return;
  }

  dragData.partnerBlocks.forEach(p => { p.res.startMin += minDelta; p.res.endMin += minDelta; });
  saveAll(); render(); dragData = null;
}

// ═══════════════════════════════════════════════════
// TOOLTIP ENGINE
// ═══════════════════════════════════════════════════
function showTooltip(e, r) {
  const t = document.getElementById('tooltip');
  const tMeta = TABLES.find(x => x.id === r.tableId);
  t.innerHTML = `<strong>${r.name}${r.suffix || ''} — ${tMeta ? tMeta.label : ''}</strong>
                 👥 人數：${r.pax}人<br>
                 ⏰ 時間：${minToTimeStr(r.startMin)} ～ ${minToTimeStr(r.endMin)}<br>
                 📞 電話：${r.phone || '無'}<br>
                 📝 備註：${r.note || '無'}`;
  t.classList.add('show'); moveTooltip(e);
}
function moveTooltip(e) {
  const t = document.getElementById('tooltip');
  t.style.left = `${e.clientX + 14}px`; t.style.top = `${e.clientY + 14}px`;
}
function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }

// CONTEXT MENU FUNCTIONS
// ═══════════════════════════════════════════════════
function showCtxMenu(e, id) {
  ctxTargetId = id;
  const menu = document.getElementById('ctx-menu');
  menu.style.left = `${e.clientX}px`; menu.style.top = `${e.clientY}px`;
  
  const r = getReservations().find(x => x.id === id);
  if (r) {
    document.getElementById('ctx-arrived-btn').textContent = r.arrived ? '❌ 取消抵達' : '✔ 已抵達';
    const highlightGroup = r.groupId;
    if (highlightGroup) {
      getReservations().forEach(x => {
        if (x.groupId === highlightGroup) document.getElementById(`block-${x.id}`)?.classList.add('group-highlight');
      });
    }
  }
  
  _cancelDelete();
  menu.classList.add('show');

  document.addEventListener('click', hideCtxMenuOnOutside);
}

function hideCtxMenu() {
  document.getElementById('ctx-menu').classList.remove('show');
  getReservations().forEach(x => { document.getElementById(`block-${x.id}`)?.classList.remove('group-highlight'); });
  document.removeEventListener('click', hideCtxMenuOnOutside);
}

function hideCtxMenuOnOutside(e) {
  if (!document.getElementById('ctx-menu').contains(e.target)) hideCtxMenu();
}

// MODAL FORMS & DATE CONTROLS
// ═══════════════════════════════════════════════════
function openModal(id = null) {
  editingId = id;
  const title = document.getElementById('modal-title');
  const cbs = document.getElementsByName('f-tables');

  cbs.forEach(cb => { cb.checked = false; cb.disabled = false; });

  if (id) {
    title.textContent = '✏️ 編輯訂位';
    const r = getReservations().find(x => x.id === id);
    if (!r) return;

    document.getElementById('f-name').value = r.name;
    setSuffix(r.suffix || '先生');
    document.getElementById('f-phone').value = r.phone || '';
    document.getElementById('f-pax').value = r.pax || '2';
    document.getElementById('f-note').value = r.note || '';

    document.getElementById('f-start-h').value = Math.floor(r.startMin / 60);
    document.getElementById('f-start-m').value = r.startMin % 60;
    document.getElementById('f-end-h').value = Math.floor(r.endMin / 60);
    document.getElementById('f-end-m').value = r.endMin % 60;

    if (r.groupId) {
      const groupTableIds = getReservations().filter(x => x.groupId === r.groupId).map(x => x.tableId);
      cbs.forEach(cb => { if (groupTableIds.includes(cb.value)) cb.checked = true; });
    } else {
      cbs.forEach(cb => { if (cb.value === r.tableId) cb.checked = true; });
    }
  } else {
    title.textContent = '新增訂位';
    document.getElementById('f-name').value = '';
    setSuffix('先生');
    document.getElementById('f-phone').value = '';
    document.getElementById('f-pax').value = '2';
    document.getElementById('f-note').value = '';

    const now = new Date();
    let cH = now.getHours(); if (cH < 10 || cH > 17) cH = 10;
    document.getElementById('f-start-h').value = cH;
    document.getElementById('f-start-m').value = 0;
    autoSetEndTime();
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editingId = null; }
function closeModalOnBg(e) { if (e.target.id === 'modal-overlay') closeModal(); }

function setSuffix(s) {
  suffix = s;
  document.getElementById('btn-mr').classList.toggle('active', s === '先生');
  document.getElementById('btn-ms').classList.toggle('active', s === '小姐');
}

function saveReservation() {
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const pax = document.getElementById('f-pax').value.trim() || '2';
  const note = document.getElementById('f-note').value.trim();

  const sh = parseInt(document.getElementById('f-start-h').value);
  const sm = parseInt(document.getElementById('f-start-m').value);
  const eh = parseInt(document.getElementById('f-end-h').value);
  const em = parseInt(document.getElementById('f-end-m').value);

  const startMin = sh * 60 + sm; const endMin = eh * 60 + em;

  if (!name) { alert('請輸入訂位人姓名！'); return; }
  if (startMin >= endMin) { alert('結束時間必須大於開始時間！'); return; }

  const cbs = document.getElementsByName('f-tables');
  const checkedTableIds = [];
  cbs.forEach(cb => { if (cb.checked) checkedTableIds.push(cb.value); });
  if (checkedTableIds.length === 0) { alert('請至少勾選指派一個桌號！'); return; }

  const purePhone = phone.replace(/[^0-9-]/g, '');
  const rs = getReservations();

  let excludeIds = [];
  if (editingId) {
    const oldR = rs.find(x => x.id === editingId);
    if (oldR) {
      excludeIds = oldR.groupId ? rs.filter(x => x.groupId === oldR.groupId).map(x => x.id) : [oldR.id];
    }
  }

  for (let tId of checkedTableIds) {
    const conflict = isConflict(tId, startMin, endMin, excludeIds);
    if (conflict) {
      alert(`⚠️ 時間發生衝突！\n${TABLES.find(t => t.id === tId).label} 在 ${minToTimeStr(conflict.startMin)}～${minToTimeStr(conflict.endMin)} 已經有「${conflict.name}${conflict.suffix || ''}」的訂位。`);
      return;
    }
  }

  if (editingId) { reservationsByDate[currentDate] = rs.filter(x => !excludeIds.includes(x.id)); }

  const generatedGroupId = checkedTableIds.length > 1 ? 'g_' + Date.now() + Math.random().toString(36).slice(2,5) : null;
  const currentRs = getReservations();

  checkedTableIds.forEach(tId => {
    const newId = 'r' + Date.now() + Math.random().toString(36).slice(2,6);
    currentRs.push({
      id: newId, groupId: generatedGroupId, name, suffix, phone: purePhone, pax, note,
      tableId: tId, startMin, endMin, arrived: false
    });
  });

  saveAll(); render(); closeModal();
}

function switchDate(dateStr) {
  currentDate = dateStr;
  document.getElementById('date-picker').value = dateStr;

  const lbl = document.getElementById('gantt-date-label');
  if (lbl) {
    const isToday = (dateStr === todayStr());
    lbl.className = isToday ? 'is-today' : '';
    lbl.textContent = dateStr + (isToday ? ' (今日)' : '');
  }

  if (FB_ENABLED && db) {
    loadDateFromFirebase(dateStr).then(() => render());
  } else {
    render();
  }
}

function shiftDate(days) {
  const current = new Date(currentDate); current.setDate(current.getDate() + days);
  const y = current.getFullYear(); const m = String(current.getMonth()+1).padStart(2,'0'); const d = String(current.getDate()).padStart(2,'0');
  switchDate(`${y}-${m}-${d}`);
}

window.addEventListener('resize', render);

// 🏁 系統最初進入點
(async () => {
  // 檢查是否在此頁籤內已經成功驗證過
  if (sessionStorage.getItem('is_cafe_admin') === 'true') {
    document.getElementById('auth-overlay').style.display = 'none';
    startSystem();
  } else {
    // 尚未驗證，強制鎖定螢幕並焦點在密碼框
    document.getElementById('auth-password').focus();
  }
})();
</script>
