<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>咖啡廳訂位管理</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --bg: #f5f0e8;
    --bg2: #ede7d9;
    --cream: #faf7f2;
    --latte: #c9a97a;
    --espresso: #6b4c2a;
    --text: #3d2b1a;
    --text-light: #9a7d65;
    --border: rgba(180,150,110,0.25);
    --shadow: 0 4px 20px rgba(100,70,40,0.10);
    --radius: 10px;

    /* Macaron palette per table */
    --t1: #f5c6c6;   /* 玫瑰粉 */
    --t2: #fde2b5;   /* 蜜桃橙 */
    --t3: #c8e6c9;   /* 薄荷綠 */
    --t5: #b3d9f7;   /* 天空藍 */
    --t6: #d4c5f0;   /* 薰衣草 */
    --ts: #ffc8d8;   /* 小包廂粉 */
    --tl: #b5e0d8;   /* 大包廂青 */

    --t1d: #c27070;
    --t2d: #c07820;
    --t3d: #4a8a50;
    --t5d: #2a6ea0;
    --t6d: #6a4aaa;
    --tsd: #c04070;
    --tld: #2a8a7a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif TC', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 40px 60px;
  }
  @media (max-width: 900px) {
    body { padding: 20px 18px 48px; }
    header { flex-wrap: wrap; gap: 12px; }
    .brand h1 { font-size: 1.6rem; }
  }
  @media (max-width: 600px) {
    body { padding: 14px 10px 60px; }
    .brand h1 { font-size: 1.3rem; }
    .brand p  { display: none; }
    .btn-add  { padding: 10px 16px; font-size: .78rem; }
    .date-nav input[type=date] { width: 108px; font-size: .76rem; }
    .res-block { min-height: 40px !important; }
  }

  /* ── Header ───────────────────────────────────────── */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .brand h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    color: var(--espresso);
    letter-spacing: .06em;
    line-height: 1;
  }
  .brand p {
    font-size: .72rem;
    color: var(--text-light);
    letter-spacing: .18em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  #today-label {
    font-size: .8rem;
    color: var(--text-light);
    letter-spacing: .1em;
  }

  .btn-add {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--espresso);
    color: var(--cream);
    border: none;
    border-radius: 50px;
    padding: 10px 22px;
    font-family: 'Noto Serif TC', serif;
    font-size: .82rem;
    letter-spacing: .1em;
    cursor: pointer;
    transition: background .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 3px 12px rgba(100,60,20,.22);
  }
  .btn-add:hover { background: #5a3a1a; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(100,60,20,.28); }
  .btn-add .plus { font-size: 1.1rem; line-height:1; }

  .date-nav {
    display: flex; align-items: center; gap: 6px;
    background: var(--cream); border: 1px solid var(--border);
    border-radius: 50px; padding: 6px 14px;
    box-shadow: 0 2px 8px rgba(100,70,40,.08);
  }
  .date-nav input[type=date] {
    border: none; background: transparent;
    font-family: 'Noto Serif TC', serif;
    font-size: .82rem; color: var(--espresso);
    letter-spacing: .05em; outline: none; cursor: pointer;
    padding: 0 4px; width: 130px;
  }
  .date-nav input[type=date]::-webkit-calendar-picker-indicator { opacity:.5; cursor:pointer; }
  .date-nav-btn {
    background: none; border: none; color: var(--latte);
    font-size: 1.15rem; cursor: pointer; padding: 0 4px;
    border-radius: 6px; transition: color .15s, background .15s; line-height:1;
  }
  .date-nav-btn:hover { color: var(--espresso); background: var(--bg2); }
  .date-nav-btn.today-btn {
    font-family: 'Noto Serif TC', serif; font-size: .7rem;
    letter-spacing: .06em; padding: 3px 10px;
    border: 1px solid var(--border); border-radius: 50px;
  }
  #gantt-date-label {
    font-size: .78rem; color: var(--text-light);
    letter-spacing: .1em; margin-bottom: 8px; text-align: right;
  }
  #gantt-date-label.is-today { color: var(--latte); font-weight: 500; }

  /* ── Gantt Wrapper ────────────────────────────────── */
  .gantt-wrap {
    background: var(--cream);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 28px 28px 32px;
    border: 1px solid var(--border);
    touch-action: pan-x;
  }
  @media (max-width: 600px) {
    .gantt-wrap { padding: 16px 10px 20px; border-radius: 12px; }
  }

  /* ── Gantt Grid ───────────────────────────────────── */
  .gantt {
    display: grid;
    grid-template-columns: 100px repeat(16, 1fr); /* 16 half-hour slots */
    min-width: 820px;
    position: relative;
  }

  /* header row */
  .gh-corner { grid-column: 1; }
  .gh-time {
    text-align: center;
    font-size: .68rem;
    color: var(--text-light);
    letter-spacing: .08em;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  .gh-time.hour-mark {
    font-size: .72rem;
    color: var(--latte);
    font-weight: 500;
  }

  /* rows */
  .grow {
    display: contents;
  }

  .grow-label {
    display: flex;
    align-items: center;
    font-size: .75rem;
    color: var(--text-light);
    letter-spacing: .08em;
    padding: 0 10px 0 4px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    user-select: none;
    white-space: nowrap;
  }

  .gcell {
    height: 56px;
    border-bottom: 1px solid var(--border);
    border-left: 1px solid transparent;
    position: relative;
    transition: background .15s;
  }
  .gcell.hour-start { border-left: 1px solid var(--border); }
  .gcell:hover { background: rgba(210,185,150,.12); }

  /* ── Reservation Blocks ───────────────────────────── */
  .res-block {
    position: absolute;
    top: 6px;
    height: 44px;
    border-radius: 8px;
    padding: 0 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    z-index: 10;
    box-shadow: 0 2px 10px rgba(0,0,0,.12);
    transition: transform .15s, box-shadow .15s, opacity .15s;
    overflow: hidden;
    min-width: 40px;
    touch-action: none;
  }
  .res-block:hover {
    transform: translateY(-1px) scale(1.01);
    box-shadow: 0 6px 18px rgba(0,0,0,.18);
    z-index: 20;
  }
  .res-block.dragging {
    opacity: .85;
    cursor: grabbing;
    transform: scale(1.03);
    box-shadow: 0 10px 30px rgba(0,0,0,.22);
    z-index: 100;
  }

  .res-name {
    font-size: .72rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .res-time {
    font-size: .62rem;
    opacity: .75;
    white-space: nowrap;
  }

  /* 已抵達 icon */
  .arrived-icon {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: .82rem;
    font-weight: 700;
    opacity: .85;
    line-height: 1;
    pointer-events: none;
  }
  /* 已抵達的色塊加左側邊框強調 */
  .res-block.arrived {
    border-left-width: 4px !important;
  }

  /* ── Tooltip ──────────────────────────────────────── */
  #tooltip {
    position: fixed;
    background: var(--espresso);
    color: var(--cream);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: .76rem;
    line-height: 1.7;
    pointer-events: none;
    opacity: 0;
    transition: opacity .18s;
    z-index: 999;
    max-width: 220px;
    box-shadow: 0 8px 24px rgba(0,0,0,.22);
    letter-spacing: .04em;
  }
  #tooltip.show { opacity: 1; }
  #tooltip strong { font-size: .8rem; display: block; margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,.2); padding-bottom: 4px; }

  /* ── Context Actions ──────────────────────────────── */
  #ctx-menu {
    position: fixed;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    box-shadow: 0 8px 28px rgba(0,0,0,.22);
    z-index: 2000;
    display: none;
    gap: 4px;
    flex-direction: column;
    min-width: 140px;
    max-width: 200px;
  }
  #ctx-menu.show { display: flex; }
  @media (max-width: 600px) {
    #ctx-menu { min-width: 160px; }
    .ctx-btn  { padding: 12px 16px; font-size: .85rem; }
  }
  #ctx-confirm-bar {
    display: flex;
    align-items: center;
    border-top: 1px solid var(--border);
    margin-top: 4px;
    padding-top: 4px;
    gap: 2px;
  }
  .ctx-btn {
    background: none;
    border: none;
    padding: 9px 14px;
    border-radius: 8px;
    font-family: 'Noto Serif TC', serif;
    font-size: .78rem;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    letter-spacing: .05em;
    transition: background .15s;
  }
  .ctx-btn:hover { background: var(--bg2); }
  .ctx-btn.danger { color: #c0392b; }
  .ctx-btn.danger:hover { background: #fce8e6; }

  /* ── Modal ────────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(60,40,20,.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 500;
    opacity: 0; pointer-events: none;
    transition: opacity .22s;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--cream);
    border-radius: 20px;
    padding: 36px 40px 32px;
    width: 420px;
    max-width: 92vw;
    box-shadow: 0 20px 60px rgba(60,30,10,.22);
    transform: translateY(16px) scale(.97);
    transition: transform .25s cubic-bezier(.22,1,.36,1);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.55rem;
    font-weight: 300;
    color: var(--espresso);
    margin-bottom: 26px;
    letter-spacing: .05em;
  }

  .form-row { margin-bottom: 18px; }
  .form-row label {
    display: block;
    font-size: .7rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 7px;
  }

  .input-row { display: flex; gap: 8px; }

  input[type=text], input[type=tel], input[type=number], select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 13px;
    font-family: 'Noto Serif TC', serif;
    font-size: .82rem;
    color: var(--text);
    outline: none;
    transition: border-color .18s, box-shadow .18s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--latte);
    box-shadow: 0 0 0 3px rgba(180,140,90,.15);
  }

  .suffix-group {
    display: flex;
    gap: 8px;
    align-items: center;
    flex: 1;
  }
  .suffix-group input { flex: 1; }

  .suffix-btn {
    padding: 10px 14px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-family: 'Noto Serif TC', serif;
    font-size: .78rem;
    color: var(--text-light);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .suffix-btn.active, .suffix-btn:hover { background: var(--espresso); color: var(--cream); border-color: var(--espresso); }

  .time-row { display: flex; align-items: center; gap: 6px; }
  .time-sep { color: var(--text-light); font-size: .9rem; padding: 0 2px; }
  .time-row select {
    width: auto;
    padding: 10px 8px;
    text-align: center;
    cursor: pointer;
  }
  /* 小時 select 略寬，分鐘略窄 */
  #f-start-h, #f-end-h { min-width: 62px; }
  #f-start-m, #f-end-m { min-width: 62px; }

  textarea { resize: vertical; min-height: 72px; }

  .modal-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    gap: 10px;
  }
  .btn-save {
    background: var(--espresso);
    color: var(--cream);
    border: none;
    border-radius: 50px;
    padding: 11px 30px;
    font-family: 'Noto Serif TC', serif;
    font-size: .82rem;
    letter-spacing: .1em;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 3px 12px rgba(100,60,20,.22);
  }
  .btn-save:hover { background: #5a3a1a; transform: translateY(-1px); }

  .btn-cancel {
    background: none;
    border: none;
    color: var(--text-light);
    font-family: 'Noto Serif TC', serif;
    font-size: .78rem;
    cursor: pointer;
    letter-spacing: .06em;
    transition: color .15s;
  }
  .btn-cancel:hover { color: var(--text); }

  /* ── Legend ───────────────────────────────────────── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: .7rem;
    color: var(--text-light);
    letter-spacing: .06em;
  }
  .leg-dot {
    width: 12px; height: 12px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--latte); border-radius: 10px; }
</style>
</head>
<body>

<div id="fb-banner" style="display:none;background:#fef3c7;border:1px solid #f59e0b;
  border-radius:10px;padding:11px 18px;margin-bottom:16px;font-size:.78rem;
  color:#78350f;letter-spacing:.04em;line-height:1.7">
  ☁️ <strong>Firebase 未設定</strong>，目前使用 localStorage（僅此裝置可見）。<br>
  如需跨裝置同步，請在程式碼頂端填入你的 Firebase 設定。
  <button onclick="this.parentElement.style.display='none'"
    style="float:right;background:none;border:none;cursor:pointer;font-size:1.1rem;line-height:1;margin-left:10px">✕</button>
</div>
<header>
  <div class="brand">
    <h1>☕ 咖啡廳訂位</h1>
    <p>Reservation Dashboard</p>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
    <div class="date-nav">
      <button class="date-nav-btn" onclick="shiftDate(-1)" title="前一天">‹</button>
      <input type="date" id="date-picker" onchange="switchDate(this.value)">
      <button class="date-nav-btn" onclick="shiftDate(1)"  title="後一天">›</button>
      <button class="date-nav-btn today-btn" onclick="switchDate(todayStr())" title="回今天">今</button>
    </div>
    <button class="btn-add" onclick="openModal()"><span class="plus">＋</span>新增訂位</button>
  </div>
</header>

<div class="legend" id="legend"></div>

<div id="gantt-date-label"></div>
<div class="gantt-wrap">
  <div class="gantt" id="gantt"></div>
</div>

<div id="tooltip"></div>
<div id="ctx-menu">
  <button class="ctx-btn" id="ctx-edit-btn">✏️ 編輯</button>
  <button class="ctx-btn" id="ctx-arrived-btn">✔ 已抵達</button>
  <button class="ctx-btn danger" id="ctx-delete-btn">🗑 刪除</button>
  <div id="ctx-confirm-bar" style="display:none">
    <span style="font-size:.72rem;color:#c0392b;padding:4px 8px 4px 14px;letter-spacing:.04em">確定刪除？</span>
    <button class="ctx-btn danger" id="ctx-confirm-yes" style="padding:6px 12px">確定</button>
    <button class="ctx-btn" id="ctx-confirm-no"  style="padding:6px 12px">取消</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <h2 id="modal-title">新增訂位</h2>
    <div class="form-row">
      <label>訂位人</label>
      <div class="input-row">
        <input type="text" id="f-name" placeholder="姓氏" style="max-width:110px">
        <div class="suffix-group">
          <button class="suffix-btn active" id="btn-mr" onclick="setSuffix('先生')">先生</button>
          <button class="suffix-btn" id="btn-ms" onclick="setSuffix('小姐')">小姐</button>
        </div>
      </div>
    </div>
    <div class="form-row">
      <label>開始時間</label>
      <div class="time-row">
        <select id="f-start-h" onchange="autoSetEndTime()"></select>
        <span class="time-sep">:</span>
        <select id="f-start-m" onchange="autoSetEndTime()"></select>
      </div>
    </div>
    <div class="form-row">
      <label>結束時間</label>
      <div class="time-row">
        <select id="f-end-h"></select>
        <span class="time-sep">:</span>
        <select id="f-end-m"></select>
      </div>
    </div>
    <div class="form-row">
      <label>電話</label>
      <input type="tel" id="f-phone" placeholder="0912-345-678">
    </div>
    <div class="form-row">
      <label>人數</label>
      <input type="number" id="f-pax" min="1" max="30" placeholder="2" style="max-width:90px">
    </div>
    <div class="form-row">
      <label>桌號</label>
      <select id="f-table"></select>
    </div>
    <div class="form-row">
      <label>備註</label>
      <textarea id="f-note" placeholder="特殊需求、活動說明…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveReservation()">儲存訂位</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// FIREBASE CONFIG
// ⚠️  請到 Firebase Console → 專案設定 → 你的應用程式
//     複製 firebaseConfig 的值貼到下方
// ═══════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
const FB_ENABLED = FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";
let db = null;
if (FB_ENABLED) {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
}

// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const TABLES = [
  { id: 't1',  label: '1號桌',          bg: '#f5c6c6', fg: '#7a3030' },
  { id: 't2',  label: '2號桌',          bg: '#fde2b5', fg: '#7a4010' },
  { id: 't3',  label: '3號桌',          bg: '#c8e6c9', fg: '#2a5e30' },
  { id: 't5',  label: '5號桌',          bg: '#b3d9f7', fg: '#1a4e7a' },
  { id: 't6',  label: '6號桌',          bg: '#d4c5f0', fg: '#4a2a8a' },
  { id: 'ts',  label: '小包廂',         bg: '#ffc8d8', fg: '#8a1a40' },
  { id: 'tl',  label: '大包廂（圓桌）', bg: '#b5e0d8', fg: '#1a5a50' },
  { id: 'lb1', label: '大包廂(1)',      bg: '#c5dff8', fg: '#1a3a6a' },
  { id: 'lb2', label: '大包廂(2)',      bg: '#d8f0c5', fg: '#2a5a1a' },
  { id: 'lb3', label: '大包廂(3)',      bg: '#f8e4c5', fg: '#6a3a0a' },
  { id: 'lb4', label: '大包廂(4)',      bg: '#e8c5f8', fg: '#5a1a7a' },
];

// ── 時間系統：全部改為「分鐘」，不再使用 slot ──────────
// 營業時間：10:00 ~ 18:00
const DAY_START = 10 * 60;  // 600 分鐘
const DAY_END   = 18 * 60;  // 1080 分鐘
const DAY_MINS  = DAY_END - DAY_START; // 480 分鐘

// 甘特圖格線（視覺用，每30分鐘一條）：不影響時間邏輯
const GRID_SLOTS = 16;  // 16 個半小時格
const LABEL_W    = 100; // 左側桌號欄寬（px），對應 CSS grid 第一欄

// ── Debug 開關 ──────────────────────────────────────
const DEBUG = false;
const dbg = (...a) => DEBUG && dbg(...a);

// ── 全域狀態 ────────────────────────────────────────
// 每筆訂位格式：{ id, name, suffix, phone, pax, note, tableId, startMin, endMin }
let reservationsByDate = {};
let currentDate        = todayStr();
let editingId          = null;
let ctxTargetId        = null;
let pendingDeleteId    = null;
let suffix             = '先生';

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function getReservations() {
  if (!reservationsByDate[currentDate]) reservationsByDate[currentDate] = [];
  return reservationsByDate[currentDate];
}
// ── localStorage 快取 ────────────────────────────────
function saveLocal() {
  try { localStorage.setItem('rbd_v1', JSON.stringify(reservationsByDate)); } catch(e) {}
}
function loadLocal() {
  try {
    const s = localStorage.getItem('rbd_v1');
    if (s) reservationsByDate = JSON.parse(s);
  } catch(e) { reservationsByDate = {}; }
}

// ── Firebase（collection: reservations / doc: YYYY-MM-DD）──
async function saveDateToFirebase(dateStr) {
  if (!FB_ENABLED || !db) return;
  try {
    await db.collection('reservations').doc(dateStr)
            .set({ list: reservationsByDate[dateStr] || [] });
  } catch(e) { dbg('FB save error:', e.message); }
}
async function loadDateFromFirebase(dateStr) {
  if (!FB_ENABLED || !db) return false;
  try {
    const doc = await db.collection('reservations').doc(dateStr).get();
    if (doc.exists) {
      reservationsByDate[dateStr] = doc.data().list || [];
      saveLocal();
      return true;
    }
    return false;
  } catch(e) { dbg('FB load error:', e.message); return false; }
}

// ── 統一介面（對外呼叫）────────────────────────────────
function saveAll() {
  saveLocal();
  saveDateToFirebase(currentDate);
}
async function loadAll() {
  loadLocal();
  if (FB_ENABLED) {
    const ok = await loadDateFromFirebase(currentDate);
    if (ok) render();
  }
}

// ═══════════════════════════════════════════════════
// 時間工具函式
// ═══════════════════════════════════════════════════

// "HH:MM" → 分鐘數（從 00:00 起算）
// 支援任意時間（10:10, 14:37 都可以）
function timeStrToMin(str) {
  const m = str.trim().match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  const h = parseInt(m[1]), min = parseInt(m[2]);
  if (h < 0 || h > 23 || min < 0 || min > 59) return null;
  return h * 60 + min;
}

// 分鐘數 → "HH:MM"
function minToTimeStr(min) {
  const h = Math.floor(min / 60);
  const m = min % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════
// 衝突判斷（唯一定義，全系統共用）
// ═══════════════════════════════════════════════════
function isConflict(tableId, startMin, endMin, excludeId = null) {
  return getReservations().find(r =>
    r.id      !== excludeId &&
    r.tableId === tableId   &&
    startMin  < r.endMin    &&
    endMin    > r.startMin
  ) || null;
}

// ═══════════════════════════════════════════════════
// 唯一寫入入口：createOrUpdateReservation
// 新增 → id 為 null；更新 → 傳入現有 id
// ═══════════════════════════════════════════════════
function upsertReservation(data) {
  const rs = getReservations();
  if (data.id) {
    const idx = rs.findIndex(r => r.id === data.id);
    if (idx !== -1) rs[idx] = { ...rs[idx], ...data };
  } else {
    rs.push({ ...data, id: 'r' + Date.now() + Math.random().toString(36).slice(2,6) });
  }
  saveAll();
  render();
}

// ═══════════════════════════════════════════════════
// 刪除（唯一定義）
// ═══════════════════════════════════════════════════
function deleteReservation(id) {
  if (!id) return;
  pendingDeleteId = id;
  document.getElementById('ctx-confirm-bar').style.display = 'flex';
  document.getElementById('ctx-menu').scrollTop = 999;
}

function _doDelete() {
  const id = pendingDeleteId;
  pendingDeleteId = null;
  document.getElementById('ctx-confirm-bar').style.display = 'none';
  hideCtxMenu();
  if (!id) return;
  reservationsByDate[currentDate] = getReservations().filter(r => r.id !== id);
  saveAll();
  render();
}

function _cancelDelete() {
  pendingDeleteId = null;
  document.getElementById('ctx-confirm-bar').style.display = 'none';
}

// ═══════════════════════════════════════════════════
// 已抵達切換
// ═══════════════════════════════════════════════════
function toggleArrived(id) {
  if (!id) return;
  const r = getReservations().find(x => x.id === id);
  if (!r) return;
  r.arrived = !r.arrived;
  saveAll();
  render();
}

// ═══════════════════════════════════════════════════
// DATE NAVIGATION
// ═══════════════════════════════════════════════════
const WEEKDAYS = ['日','一','二','三','四','五','六'];

function updateDateUI() {
  const picker = document.getElementById('date-picker');
  if (picker) picker.value = currentDate;
  const d   = new Date(currentDate + 'T00:00:00');
  const lbl = document.getElementById('gantt-date-label');
  const isToday = currentDate === todayStr();
  if (lbl) {
    lbl.textContent = d.getFullYear() + ' / ' + (d.getMonth()+1) + ' / ' + d.getDate() +
                      ' （週' + WEEKDAYS[d.getDay()] + '）' + (isToday ? '  ✦ 今天' : '');
    lbl.className = isToday ? 'is-today' : '';
  }
}

async function switchDate(dateStr) {
  if (!dateStr) return;
  currentDate = dateStr;
  if (!reservationsByDate[currentDate]) reservationsByDate[currentDate] = [];
  updateDateUI();
  render();
  if (FB_ENABLED) {
    const ok = await loadDateFromFirebase(currentDate);
    if (ok) render();
  }
}

function shiftDate(delta) {
  const d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  switchDate(d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0'));
}

// ═══════════════════════════════════════════════════
// BUILD GANTT（視覺格線，純 DOM，不影響時間邏輯）
// ═══════════════════════════════════════════════════
function buildGantt() {
  const g = document.getElementById('gantt');
  g.innerHTML = '';

  // 角落
  const corner = document.createElement('div');
  corner.className = 'gh-corner';
  g.appendChild(corner);

  // 時間標頭（每30分鐘一格）
  for (let s = 0; s < GRID_SLOTS; s++) {
    const totalMins = s * 30;
    const h = 10 + Math.floor(totalMins / 60);
    const m = totalMins % 60;
    const div = document.createElement('div');
    div.className = 'gh-time' + (m === 0 ? ' hour-mark' : '');
    div.textContent = m === 0 ? `${h}:00` : '';
    g.appendChild(div);
  }

  // 桌號列
  TABLES.forEach(t => {
    const label = document.createElement('div');
    label.className = 'grow-label';
    label.textContent = t.label;
    g.appendChild(label);

    for (let s = 0; s < GRID_SLOTS; s++) {
      const cell = document.createElement('div');
      cell.className = 'gcell' + (s % 2 === 0 ? ' hour-start' : '');
      cell.dataset.table = t.id;
      cell.dataset.slot  = s;
      g.appendChild(cell);
    }
  });
}

// ═══════════════════════════════════════════════════
// LEGEND
// ═══════════════════════════════════════════════════
function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  TABLES.forEach(t => {
    el.innerHTML += `<div class="leg-item">
      <div class="leg-dot" style="background:${t.bg};border:1px solid ${t.fg}33"></div>
      ${t.label}
    </div>`;
  });
}

// ═══════════════════════════════════════════════════
// 座標工具：gantt 內的 X → 分鐘數
// ═══════════════════════════════════════════════════
function ganttContentWidth() {
  const gantt = document.getElementById('gantt');
  return gantt.getBoundingClientRect().width - LABEL_W;
}

// clientX → 分鐘數（從 DAY_START 起算）
function clientXToMin(clientX) {
  const gantt    = document.getElementById('gantt');
  const rect     = gantt.getBoundingClientRect();
  const relX     = clientX - rect.left - LABEL_W + gantt.scrollLeft;
  const ratio    = relX / ganttContentWidth();
  const min      = DAY_START + ratio * DAY_MINS;
  return Math.max(DAY_START, Math.min(DAY_END, Math.round(min)));
}

// 分鐘數 → gantt 內的 px left（相對 gantt 左邊，含 LABEL_W 偏移）
function minToLeft(min) {
  const ratio = (min - DAY_START) / DAY_MINS;
  return LABEL_W + ratio * ganttContentWidth();
}

// clientY → table row index
function clientYToRowIdx(clientY) {
  const gantt     = document.getElementById('gantt');
  const rect      = gantt.getBoundingClientRect();
  const firstCell = document.querySelector('.gcell');
  const headerH   = firstCell.getBoundingClientRect().top - rect.top;
  const cellH     = firstCell.offsetHeight;
  const relY      = clientY - rect.top - headerH;
  const idx       = Math.floor(relY / cellH);
  return Math.max(0, Math.min(TABLES.length - 1, idx));
}

// row index → top px（相對 gantt）
function rowIdxToTop(rowIdx) {
  const firstCell = document.querySelector('.gcell');
  const gantt     = document.getElementById('gantt');
  const rect      = gantt.getBoundingClientRect();
  const headerH   = firstCell.getBoundingClientRect().top - rect.top;
  const cellH     = firstCell.offsetHeight;
  return headerH + rowIdx * cellH;
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render() {
  document.querySelectorAll('.res-block').forEach(e => e.remove());
  getReservations().forEach(r => renderBlock(r));
}

function renderBlock(r) {
  const table = TABLES.find(t => t.id === r.tableId);
  if (!table) return;

  const gantt   = document.getElementById('gantt');
  const rowIdx  = TABLES.findIndex(t => t.id === r.tableId);
  const cw      = ganttContentWidth();
  const cellH   = document.querySelector('.gcell').offsetHeight;

  // 用分鐘比例計算 left / width
  const left  = minToLeft(r.startMin);
  const width = (r.endMin - r.startMin) / DAY_MINS * cw - 4;
  const top   = rowIdxToTop(rowIdx) + 6;

  const block = document.createElement('div');
  block.className    = 'res-block';
  block.id           = 'rb-' + r.id;
  block.dataset.id   = r.id;
  block.style.cssText = `
    left:${left}px; top:${top}px;
    width:${Math.max(20, width)}px; height:${cellH - 12}px;
    background:${table.bg}; color:${table.fg};
    border:1.5px solid ${table.fg}30;
  `;

  block.innerHTML = `
    <div class="res-name">${r.name}${r.suffix}</div>
    <div class="res-time">${minToTimeStr(r.startMin)}～${minToTimeStr(r.endMin)}</div>`;

  // ── arrived 狀態 ────────────────────────────────
  if (r.arrived) {
    block.classList.add('arrived');
    const icon = document.createElement('div');
    icon.className = 'arrived-icon';
    icon.textContent = '✔';
    block.appendChild(icon);
  }

  // ── Tooltip ─────────────────────────────────────
  block.addEventListener('mouseenter', e => showTooltip(e, r));
  block.addEventListener('mousemove',  e => moveTooltip(e));
  block.addEventListener('mouseleave', () => hideTooltip());

  // ── 右鍵選單 ─────────────────────────────────────
  block.addEventListener('contextmenu', e => {
    e.preventDefault();
    e.stopPropagation();
    ctxTargetId = r.id;
    hideTooltip();
    updateCtxArrivedLabel(r.arrived);
    showCtxMenu(e.clientX, e.clientY);
  });

  // ── 拖曳 + 左鍵點擊（合併在同一個 mousedown）────
  // 在 mousedown 立刻鎖定 id；mouseup 時判斷移動距離，
  // 距離 < 5px 視為「點擊」→ 顯示選單；否則視為拖曳
  makeDraggable(block, r);

  gantt.appendChild(block);
}

// ctx-menu 顯示「已抵達」或「取消抵達」
function updateCtxArrivedLabel(arrived) {
  document.getElementById('ctx-arrived-btn').textContent =
    arrived ? '✔ 取消抵達' : '✔ 已抵達';
}

// ═══════════════════════════════════════════════════
// DRAG & DROP — Pointer Events（桌機 + 手機統一）
// ═══════════════════════════════════════════════════
function makeDraggable(block, r) {
  // pointerdown 統一處理 mouse / touch / stylus
  block.addEventListener('pointerdown', e => {
    // 僅處理主要輸入（左鍵 / 第一觸點）
    if (e.button !== 0 && e.pointerType === 'mouse') return;
    e.stopPropagation();
    e.preventDefault();   // 阻止手機 scroll 干擾拖曳

    ctxTargetId = r.id;
    hideCtxMenu();
    hideTooltip();

    const gantt     = document.getElementById('gantt');
    const blockRect = block.getBoundingClientRect();
    const dur       = r.endMin - r.startMin;

    const grabOffsetX = e.clientX - blockRect.left;
    const grabOffsetY = e.clientY - blockRect.top;
    const startX      = e.clientX;
    const startY      = e.clientY;

    block.style.transition = 'none';
    let isDragging = false;

    // ── pointermove 綁在 document，手指移出色塊也不中斷 ──
    const onMove = mv => {
      const dx = mv.clientX - startX;
      const dy = mv.clientY - startY;
      if (!isDragging && Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
      if (!isDragging) {
        isDragging = true;
        block.classList.add('dragging');
      }
      mv.preventDefault();
      const gr = gantt.getBoundingClientRect();
      block.style.left = (mv.clientX - gr.left - grabOffsetX + gantt.scrollLeft) + 'px';
      block.style.top  = (mv.clientY - gr.top  - grabOffsetY + gantt.scrollTop)  + 'px';
    };

    // ── pointerup / pointercancel 同樣綁 document ────────
    const onUp = up => {
      document.removeEventListener('pointermove',   onMove);
      document.removeEventListener('pointerup',     onUp);
      document.removeEventListener('pointercancel', onUp);
      block.style.transition = '';
      block.classList.remove('dragging');

      if (!isDragging) {
        // 短點擊 → 顯示操作選單（桌機 + 手機共用）
        updateCtxArrivedLabel(r.arrived);
        showCtxMenu(startX, startY + 4);
        return;
      }

      const blockLeftClientX = up.clientX - grabOffsetX;
      const newStartMin  = snapMin(clientXToMin(blockLeftClientX));
      const clampedStart = Math.max(DAY_START, Math.min(DAY_END - dur, newStartMin));
      const clampedEnd   = clampedStart + dur;

      const blockTopClientY = up.clientY - grabOffsetY;
      const newRowIdx  = clientYToRowIdx(blockTopClientY);
      const newTableId = TABLES[newRowIdx].id;

      const conflict = isConflict(newTableId, clampedStart, clampedEnd, r.id);
      if (conflict) {
        alert(`⚠️ 時間衝突！\n${TABLES.find(t=>t.id===newTableId).label} 於 ${minToTimeStr(conflict.startMin)}～${minToTimeStr(conflict.endMin)} 已有「${conflict.name}${conflict.suffix}」的訂位。`);
        render();
        return;
      }

      upsertReservation({ ...r, startMin: clampedStart, endMin: clampedEnd, tableId: newTableId });
    };

    // 關鍵：綁在 document，確保手機手指移出色塊也能持續追蹤
    document.addEventListener('pointermove',   onMove, { passive: false });
    document.addEventListener('pointerup',     onUp);
    document.addEventListener('pointercancel', onUp);
  });
}

// 吸附：snap 到最近的 5 分鐘
function snapMin(min) {
  return Math.round(min / 5) * 5;
}

// ═══════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════
const tip = document.getElementById('tooltip');
function showTooltip(e, r) {
  tip.innerHTML = `<strong>${r.name}${r.suffix}</strong>
    📞 ${r.phone || '—'}<br>
    👥 ${r.pax || '—'} 人<br>
    ${r.note ? '📝 ' + r.note : ''}`;
  tip.classList.add('show');
  moveTooltip(e);
}
function moveTooltip(e) {
  tip.style.left = (e.clientX + 16) + 'px';
  tip.style.top  = (e.clientY - 10) + 'px';
}
function hideTooltip() { tip.classList.remove('show'); }

// ═══════════════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════════════
function showCtxMenu(x, y) {
  const menu = document.getElementById('ctx-menu');
  menu.style.left = '-9999px';
  menu.style.top  = '-9999px';
  menu.classList.add('show');
  const mw = menu.offsetWidth  || 160;
  const mh = menu.offsetHeight || 140;
  const safeX = Math.min(x, window.innerWidth  - mw - 8);
  const safeY = (y + mh + 8 > window.innerHeight)
                ? Math.max(8, y - mh) : y;
  menu.style.left = Math.max(8, safeX) + 'px';
  menu.style.top  = safeY + 'px';
}
function hideCtxMenu() {
  document.getElementById('ctx-menu').classList.remove('show');
}

// ═══════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════
function buildTableSelect() {
  const sel = document.getElementById('f-table');
  sel.innerHTML = TABLES.map(t => `<option value="${t.id}">${t.label}</option>`).join('');
}

function buildTimeSelects() {
  // 開始小時：10 ~ 17（最早開始，最晚結束 18:00）
  const sh = document.getElementById('f-start-h');
  sh.innerHTML = '';
  for (let h = 10; h <= 17; h++) {
    sh.innerHTML += `<option value="${h}">${String(h).padStart(2,'0')}</option>`;
  }

  // 結束小時：10 ~ 18
  const eh = document.getElementById('f-end-h');
  eh.innerHTML = '';
  for (let h = 10; h <= 18; h++) {
    eh.innerHTML += `<option value="${h}">${String(h).padStart(2,'0')}</option>`;
  }

  // 分鐘：00 ~ 59，每分鐘一格
  ['f-start-m', 'f-end-m'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '';
    for (let m = 0; m < 60; m++) {
      sel.innerHTML += `<option value="${m}">${String(m).padStart(2,'0')}</option>`;
    }
  });
}

// 讀取開始/結束時間（分鐘數）
function getFormStartMin() {
  const h = parseInt(document.getElementById('f-start-h').value);
  const m = parseInt(document.getElementById('f-start-m').value);
  return h * 60 + m;
}
function getFormEndMin() {
  const h = parseInt(document.getElementById('f-end-h').value);
  const m = parseInt(document.getElementById('f-end-m').value);
  return h * 60 + m;
}

// 設定開始時間 select
function setFormStartMin(totalMin) {
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  document.getElementById('f-start-h').value = Math.max(10, Math.min(17, h));
  document.getElementById('f-start-m').value = m;
}

// 設定結束時間 select
function setFormEndMin(totalMin) {
  const clamped = Math.min(DAY_END, Math.max(DAY_START + 1, totalMin));
  const h = Math.floor(clamped / 60);
  const m = clamped % 60;
  document.getElementById('f-end-h').value = Math.max(10, Math.min(18, h));
  document.getElementById('f-end-m').value = m;
}

// 開始時間變動 → 自動計算結束時間（+120 分鐘，上限 18:00）
function autoSetEndTime() {
  const startMin = getFormStartMin();
  const autoEnd  = Math.min(DAY_END, startMin + 120); // +2小時，不超過 18:00
  setFormEndMin(autoEnd);
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? '編輯訂位' : '新增訂位';

  if (id) {
    const r = getReservations().find(x => x.id === id);
    if (!r) return;
    document.getElementById('f-name').value  = r.name;
    document.getElementById('f-phone').value = r.phone;
    document.getElementById('f-pax').value   = r.pax;
    document.getElementById('f-note').value  = r.note;
    setFormStartMin(r.startMin);
    setFormEndMin(r.endMin);
    document.getElementById('f-table').value = r.tableId;
    setSuffix(r.suffix);
  } else {
    document.getElementById('f-name').value  = '';
    document.getElementById('f-phone').value = '';
    document.getElementById('f-pax').value   = '2';
    document.getElementById('f-note').value  = '';

    // 預設：當前時間 snap 到 5 分鐘，+2 小時為結束
    const n = new Date();
    const curMin   = snapMin(n.getHours() * 60 + n.getMinutes());
    const defStart = Math.max(DAY_START, Math.min(DAY_END - 120, curMin));
    setFormStartMin(defStart);
    setFormEndMin(Math.min(DAY_END, defStart + 120));
    document.getElementById('f-table').value = TABLES[0].id;
    setSuffix('先生');
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function setSuffix(s) {
  suffix = s;
  document.getElementById('btn-mr').classList.toggle('active', s === '先生');
  document.getElementById('btn-ms').classList.toggle('active', s === '小姐');
}

// 表單儲存 → 唯一寫入入口 upsertReservation
function saveReservation() {
  const name    = document.getElementById('f-name').value.trim();
  const phone   = document.getElementById('f-phone').value.trim();
  const pax     = document.getElementById('f-pax').value;
  const note    = document.getElementById('f-note').value.trim();
  const tableId = document.getElementById('f-table').value;

  if (!name) { alert('請輸入訂位人姓氏'); return; }

  // 全程用分鐘運算，不做字串拼接
  const startMin = getFormStartMin();
  const endMin   = getFormEndMin();

  if (endMin <= startMin) { alert('結束時間必須晚於開始時間'); return; }
  if (startMin < DAY_START || endMin > DAY_END) {
    alert(`時間需在 10:00 ～ 18:00 之間`); return;
  }

  // 衝突檢查（唯一定義）
  const conflict = isConflict(tableId, startMin, endMin, editingId);
  if (conflict) {
    const tbl = TABLES.find(t => t.id === tableId);
    alert(`⚠️ 時間衝突！\n${tbl.label} 於 ${minToTimeStr(conflict.startMin)}～${minToTimeStr(conflict.endMin)} 已有「${conflict.name}${conflict.suffix}」的訂位，請調整時間或桌號。`);
    return;
  }

  // 透過唯一寫入入口儲存
  upsertReservation({
    id: editingId, // null = 新增，有值 = 更新
    name, suffix, phone, pax, note, tableId,
    startMin, endMin
  });

  closeModal();
}
